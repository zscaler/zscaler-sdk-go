name: ZIdentity Test
on:
  # Integration tests run against live Zidentity tenants — they consume
  # real API quota, depend on long-lived credentials stored as repo
  # secrets, and flake on transient infra issues. For all PR / merge /
  # push / scheduled validation we rely exclusively on the OneAPI-mocked
  # unit suite (.github/workflows/unit-tests.yml).
  #
  # This workflow is on-demand only: fire it from the Actions tab when
  # you are actively developing a resource that genuinely requires
  # end-to-end verification against a real tenant.
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

  # For systems with an upstream API that could drift unexpectedly (like most SaaS systems, etc.),
  # we recommend testing at a regular interval not necessarily tied to code changes. This will
  # ensure you are alerted to something breaking due to an API change, even if the code did not
  # change.


jobs:
  zidentity-zsbeta-tests:
    environment: ZIDENTITY_BETA
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goVersion: ["1.25"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.goVersion }}
          cache: true
          cache-dependency-path: go.sum

      - name: Set Go env
        run: |
          echo "GOPATH=$(go env GOPATH)" >> $GITHUB_ENV
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: go mod download

      - name: Run tests with retry on Ubuntu
        uses: nick-fields/retry@v4
        with:
          max_attempts: 1
          timeout_minutes: 20 # Adjust as needed
          command: |
            make sweep:zid
            make test:integration:zid
        env:
          ZSCALER_CLIENT_ID: ${{ secrets.ZSCALER_CLIENT_ID }}
          ZSCALER_CLIENT_SECRET: ${{ secrets.ZSCALER_CLIENT_SECRET }}
          ZSCALER_VANITY_DOMAIN: ${{ secrets.ZSCALER_VANITY_DOMAIN }}
          ZSCALER_CLOUD: ${{ secrets.ZSCALER_CLOUD }}
          ZIDENTITY_SDK_TEST_SWEEP: ${{ secrets.ZIDENTITY_SDK_TEST_SWEEP }}

      - name: Publish test coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./zidcoverage.out
          flags: zid
          fail_ci_if_error: false