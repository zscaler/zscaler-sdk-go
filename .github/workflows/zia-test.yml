name: ZIA Test
on:
  # Integration tests run against live ZIA tenants — they consume real
  # API quota, depend on long-lived credentials stored as repo secrets,
  # and flake on transient infra issues. For all PR / merge / push /
  # scheduled validation we rely exclusively on the OneAPI-mocked unit
  # suite (.github/workflows/unit-tests.yml).
  #
  # This workflow is on-demand only: fire it from the Actions tab when
  # you are actively developing a resource that genuinely requires
  # end-to-end verification against a real tenant.
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

  # For systems with an upstream API that could drift unexpectedly (like most SaaS systems, etc.),
  # we recommend testing at a regular interval not necessarily tied to code changes. This will
  # ensure you are alerted to something breaking due to an API change, even if the code did not
  # change.


jobs:
  zia-zs3-tests:
    environment: ZIDENTITY_PRODUCTION
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goVersion: ["1.25"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.goVersion }}
          cache: true
          cache-dependency-path: go.sum

      - name: Set Go env
        run: |
          echo "GOPATH=$(go env GOPATH)" >> $GITHUB_ENV
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: go mod download

      - name: Run unit tests
        run: make test:unit:zia
        continue-on-error: false

      - name: Run tests with retry on Ubuntu
        uses: nick-fields/retry@v4
        with:
          max_attempts: 1
          timeout_minutes: 20 # Adjust as needed
          command: |
            make sweep:zia
            make test:integration:zia
        env:
          ZSCALER_CLIENT_ID: ${{ secrets.ZSCALER_CLIENT_ID }}
          ZSCALER_CLIENT_SECRET: ${{ secrets.ZSCALER_CLIENT_SECRET }}
          ZSCALER_VANITY_DOMAIN: ${{ secrets.ZSCALER_VANITY_DOMAIN }}
          ZSCALER_CLOUD: ${{ secrets.ZSCALER_CLOUD }}
          ZIA_SDK_TEST_SWEEP: ${{ secrets.ZIA_SDK_TEST_SWEEP }}
          ZSCALER_SANDBOX_TOKEN: ${{ secrets.ZSCALER_SANDBOX_TOKEN }}
          ZSCALER_SANDBOX_CLOUD: ${{ secrets.ZSCALER_SANDBOX_CLOUD }}
          ZPA_CUSTOMER_ID: ${{ secrets.ZPA_CUSTOMER_ID }}

      - name: Publish test coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./ziacoverage.out
          flags: zia
          fail_ci_if_error: false