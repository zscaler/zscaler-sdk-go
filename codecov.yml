# Codecov Configuration
# https://docs.codecov.com/docs/codecov-yaml
#
# Scope (May 2026)
# ----------------
# Codecov reports on the OneAPI-mocked unit suite only. Integration tests
# (zia-test.yml, zpa-test.yml, …) are workflow_dispatch-only and do not
# upload to Codecov, so there is no point carrying integration flags here.
#
# The PR gate is .github/workflows/unit-tests.yml. It uploads a single
# coverage.out under the `unit` flag — every product (zpa, zia, zcc, …)
# is already represented inside that one profile via `-coverpkg=…`.
#
# Codecov AI (Beta) — Requires GitHub App installation
# Install: https://github.com/apps/codecov-ai
# Commands available in PR comments:
#   @codecov-ai-reviewer test   - Generate tests for uncovered code
#   @codecov-ai-reviewer review - Review PR and provide suggestions

codecov:
  require_ci_to_pass: true
  notify:
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  # Range tuned to realistic OneAPI-mocked unit coverage. Overall is
  # currently ~52% with per-product spread from ~28% (ztw) to ~80%
  # (zid). 40 is the "red" floor in PR comments, 80 is the "green"
  # ceiling — bump these up as coverage climbs.
  range: "40...80"
  status:
    # Project-wide gate. `auto` compares the PR head against the base
    # commit instead of pinning an absolute target, which would just
    # churn as the SDK grows. The 2% threshold absorbs unavoidable
    # wiggle (test reorgs, generated structs, etc.) so trivial PRs
    # don't get flagged.
    project:
      default:
        target: auto
        threshold: 2%
        informational: false
        only_pulls: false
    # Patch gate covers only the lines this PR touches. We aim for
    # 60% on net-new code but keep it informational while the suite
    # is still ramping — Codecov will surface the patch number in
    # the comment, but a low value won't block the merge. Flip
    # `informational: false` once the overall floor is comfortably
    # above 60%.
    patch:
      default:
        target: 60%
        threshold: 5%
        informational: true
        only_pulls: true

parsers:
  go:
    partials_as_hits: true

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

# A single flag matches the unit-tests.yml upload step:
#   - uses: codecov/codecov-action@v5
#     with:
#       files: ./coverage.out
#       flags: unit
#
# Per-product breakdowns are still visible on Codecov via the file/folder
# views (zscaler/zpa/..., zscaler/zia/..., etc.); we don't need separate
# `unit-zpa`, `unit-zia`, … flags unless we start uploading separate
# profiles per product.
flags:
  unit:
    paths:
      - zscaler/
    carryforward: true

ignore:
  - "vendor/**/*"
  - "**/*_test.go"
  - "**/test/**/*"
  - "tests/**/*"
  - "local_test/**/*"
  - "examples/**/*"
  - "scripts/**/*"
  - "docs/**/*"
